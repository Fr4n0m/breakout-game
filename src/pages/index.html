<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout con JS</title>
    <link rel="icon" type="image/jpg" href="/favicon.png" />
</head>

<style>
    body {
        background-color: #111;
    }

    canvas {
        border: 3px solid #fff;
        border-bottom: transparent;
        background: url("/background2.avif") center;
        margin: 0 auto;
        display: block;
    }

    #title {
        width: 458px;
        height: auto;
        margin: 20px auto;
        display: block;
    }
</style>

<canvas id="game-canvas"></canvas>

<img id="title" src="/BreakOutTitle.png" alt="Arcade Breakout">

<img hidden id="sprite" src="/Breakout_Tile_Free.png" alt="Breakout sprite">

<script type="module">
    import { initBreakoutGame } from "/js/breakout/index.js";

    initBreakoutGame({
        canvasSelector: "#game-canvas",
        spriteSelector: "#sprite"
    });
</script>

</html>
